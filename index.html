/* CONTAINER */

  box-shadow:0 2px 6px rgba(0,0,0,0.05);

.section-header{

  display:flex;

}

.section-body{display:none}

/* TABLE */
table{

  border-collapse:collapse;
}

th{
  background:#faf3d1;
  color:#5a4500;
}

th,td{
  padding:8px;

}

/* BUTTON */
.actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:20px 0;
}

button{
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;

}

/* BUTTON WARNA */
.reset{
  background:#19c55b;

}

.blue{

}

/* RESULT BOX */
.result{

  border-radius:12px;
  padding:15px;
  border:1px solid #e6d38a;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#19c55b;
  color:#fff;
  padding:10px 18px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
  font-weight:bold;
}

.toast.show{opacity:1}

/* ===== ANIMATION ===== */

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.container{
  animation:fadeUp .8s ease;
}

.section{
  animation:fadeUp .5s ease;
  transition:.3s;
}

.section:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(87,255,143,.4);
}

button{
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
}

.result{
  animation:fadeUp .8s ease;
}

const content=document.getElementById("content");

function toggle(e){
  const b=e.nextElementSibling;
  b.style.display=b.style.display==="block"?"none":"block";
}

function update(){
  let d=0,p=0,i=0,ps=[];
  document.querySelectorAll("input:checked").forEach(x=>{
    d+=+x.dataset.d; p+=+x.dataset.p; i+=+x.dataset.i;
    ps.push(x.dataset.kode);
  });
  totalDenda.textContent=d;
  totalPenjara.textContent=p;
  totalImpound.textContent=i;
  pasalList.textContent=ps.length?ps.join(", "):"-";
}

function resetAll(){
  document.querySelectorAll("input").forEach(x=>x.checked=false);
  update();
}

function toast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function copyPasal(){
  copyText(pasalList.textContent);
}

function copyValue(t){
  copyText(
    t==="denda" ? totalDenda.textContent :
    t==="penjara" ? totalPenjara.textContent :
    totalImpound.textContent
  );
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text)
      .then(()=>toast());
  }else{
    const temp=document.createElement("textarea");
    temp.value=text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
    toast();
  }
}
